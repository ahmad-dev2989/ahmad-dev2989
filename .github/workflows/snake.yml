name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

# This explicitly gives the action permission to push the new file
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 to clear Node.js warning
      
      - name: Generate the Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#38bdf8&color_dots=#09090b,#1e293b,#0ea5e9,#38bdf8,#bae6fd
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4 # Updated to v4 to clear Node.js warning
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
