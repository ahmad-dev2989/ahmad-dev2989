name: Generate Snake Animation

on:
  schedule:
    # Runs automatically at midnight every day
    - cron: "0 0 * * *" 
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Generate the Snake SVG
        uses: Platane/snk@v3
        with:
          # Automatically pulls your username
          github_user_name: ${{ github.repository_owner }}
          # Generates the file and customizes the colors to match your blue/dark theme
          outputs: |
            dist/github-snake.svg?color_snake=#38bdf8&color_dots=#09090b,#1e293b,#0ea5e9,#38bdf8,#bae6fd
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          # Saves the generated SVG to a separate branch so it doesn't clutter your main code
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
